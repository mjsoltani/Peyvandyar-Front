version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      shm_size: '2gb'
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - peyvandyar-network
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  peyvandyar-network:
    driver: bridge
